<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Lichess Stockfish Yardımcısı</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px 16px;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      font-size: 13px;
      background: #1a1a22;
      color: #eaeaea;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #4fc3f7;
      font-weight: 700;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
    }
    .row label {
      color: #cfd8dc;
    }
    input[type="number"] {
      width: 70px;
      background: #2a2a35;
      color: #fff;
      border: 1px solid #3a3a48;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }
    .switch {
      position: relative;
      width: 38px;
      height: 20px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 20px;
      transition: 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider {
      background: #4fc3f7;
    }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #22222d;
      font-size: 12px;
      color: #b0bec5;
      text-align: center;
    }
    .status.ok { color: #81c784; }
    .status.err { color: #ef5350; }
    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Lichess Stockfish Yardımcısı</h1>

  <div class="row">
    <label for="enabled">Eklentiyi aç</label>
    <label class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <label for="showArrow">Ok göster</label>
    <label class="switch">
      <input type="checkbox" id="showArrow" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <label for="showEval">Skor kutusunu göster</label>
    <label class="switch">
      <input type="checkbox" id="showEval" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <label for="multipv">Alternatif ok sayısı</label>
    <input type="number" id="multipv" min="1" max="5" value="3">
  </div>

  <div class="row">
    <label for="depth">Analiz derinliği</label>
    <input type="number" id="depth" min="1" max="30" value="16">
  </div>

  <div class="row">
    <label for="movetime">Hamle süresi (ms, 0=kapalı)</label>
    <input type="number" id="movetime" min="0" max="60000" step="100" value="0">
  </div>

  <hr style="border:none; border-top:1px solid #2a2a35; margin:10px 0">

  <div class="row">
    <label for="limitStrength">Stockfish'i zayıflat (ELO sınırla)</label>
    <label class="switch">
      <input type="checkbox" id="limitStrength">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <label for="elo">Hedef ELO (1320-3190)</label>
    <input type="number" id="elo" min="1320" max="3190" step="10" value="1500">
  </div>

  <hr style="border:none; border-top:1px solid #2a2a35; margin:10px 0">

  <div class="row">
    <label for="autoPlay" title="DİKKAT: Eklenti senin yerine otomatik hamle yapar. Rated oyunlarda asla kullanma — ban riski yüksektir.">⚠ Otomatik hamle yap</label>
    <label class="switch">
      <input type="checkbox" id="autoPlay">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <label for="autoPlayDelay">Otomatik hamle gecikmesi (ms)</label>
    <input type="number" id="autoPlayDelay" min="0" max="10000" step="100" value="800">
  </div>

  <div class="status" id="status">Motor durumu kontrol ediliyor…</div>

  <div class="footer">v1.0 · sadece kişisel kullanım</div>

  <script src="popup.js"></script>
</body>
</html>
